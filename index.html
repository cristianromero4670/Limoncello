<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Link page premium de galería artesanal con estética cálida, elegante y contemporánea."
    />
    <title>Galería Artesanal | Link Page Premium</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8R2QERJvTumTRWQ7vJY8dWf8o6qFq9Q=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background" role="img" aria-label="Fotografía de galería artesanal"></div>
    <div class="background-overlay" aria-hidden="true"></div>

    <main class="layout">
      <aside class="sidebar reveal" aria-label="Panel principal de la galería">
        <header class="brand-block">
          <img src="logo.png" alt="Logo de la galería artesanal" class="brand-logo" />
          <p class="brand-name">Galería Artesanal</p>
          <p class="brand-tagline">Piezas únicas · Hechas a mano · Con alma</p>
        </header>

        <section class="intro" aria-labelledby="frase-principal">
          <h1 id="frase-principal">Arte hecho a mano para espacios con historia.</h1>
          <p>
            Curaduría de artesanía mexicana contemporánea con acabados nobles y
            esencia boutique.
          </p>
        </section>

        <nav class="link-cards" aria-label="Enlaces principales">
          <a href="#" class="link-card reveal" target="_blank" rel="noopener noreferrer">
            <span class="card-icon" aria-hidden="true"><i class="fa-brands fa-tiktok"></i></span>
            <span class="card-text">TikTok</span>
            <span class="card-arrow" aria-hidden="true"><i class="fa-solid fa-arrow-right"></i></span>
          </a>

          <a href="#" class="link-card reveal" target="_blank" rel="noopener noreferrer">
            <span class="card-icon" aria-hidden="true"><i class="fa-brands fa-instagram"></i></span>
            <span class="card-text">Instagram</span>
            <span class="card-arrow" aria-hidden="true"><i class="fa-solid fa-arrow-right"></i></span>
          </a>

          <a href="#" class="link-card reveal" target="_blank" rel="noopener noreferrer">
            <span class="card-icon" aria-hidden="true"><i class="fa-brands fa-whatsapp"></i></span>
            <span class="card-text">WhatsApp</span>
            <span class="card-arrow" aria-hidden="true"><i class="fa-solid fa-arrow-right"></i></span>
          </a>

          <a href="#" class="link-card reveal" target="_blank" rel="noopener noreferrer">
            <span class="card-icon" aria-hidden="true"><i class="fa-solid fa-book-open"></i></span>
            <span class="card-text">Catálogo</span>
            <span class="card-arrow" aria-hidden="true"><i class="fa-solid fa-arrow-right"></i></span>
          </a>
        </nav>

        <footer class="socials reveal" aria-label="Redes sociales">
          <a href="#" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
          <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
          <a href="#" aria-label="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
        </footer>
      </aside>

      <section class="visual-panel" aria-hidden="true">
        <img src="background.jpg" alt="" class="visual-image reveal" />
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
